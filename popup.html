<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #0b0b10;
      --bg-2: #14121c;
      --card: #1a1826;
      --card-border: #2a2740;
      --text: #f3f2f8;
      --text-dim: #9d9ab3;
      --accent: #ff0044;
      --accent-2: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #ff0044 0%, #8b5cf6 100%);
      --accent-hover: #e6003d;
      --green: #33d17a;
      --input-bg: #131020;
      --input-border: #2e2a44;
    }
    body[data-theme="light"] {
      --bg: #f4f2fb;
      --bg-2: #ffffff;
      --card: #ffffff;
      --card-border: #e6e1f7;
      --text: #1a1626;
      --text-dim: #6d6785;
      --accent: #ff0044;
      --accent-2: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #ff0044 0%, #8b5cf6 100%);
      --accent-hover: #e6003d;
      --green: #22a45f;
      --input-bg: #f6f4fc;
      --input-border: #e2ddf3;
    }

    html, body { overflow-x: hidden; }

    body {
      width: 380px;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 18px;
      position: relative;
      transition: background 0.2s, color 0.2s;
    }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.28;
      z-index: -1;
      pointer-events: none;
    }
    .bg-blob.one {
      width: 220px; height: 220px; top: -60px; left: -60px;
      background: var(--accent);
      animation: floatBlob1 9s ease-in-out infinite;
    }
    .bg-blob.two {
      width: 260px; height: 260px; bottom: -80px; right: -80px;
      background: var(--accent-2);
      animation: floatBlob2 11s ease-in-out infinite;
    }
    @keyframes floatBlob1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, 20px) scale(1.15); }
    }
    @keyframes floatBlob2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-25px, -15px) scale(1.1); }
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: var(--accent-gradient);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(255, 0, 68, 0.35);
      flex-shrink: 0;
    }
    .brand-title {
      font-size: 15px; font-weight: 800; letter-spacing: 0.2px;
      background: var(--accent-gradient);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .brand-sub { display: flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--text-dim); font-weight: 600; margin-top: 1px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #555; transition: background 0.2s, box-shadow 0.2s; }
    .dot.on { background: var(--green); box-shadow: 0 0 8px #33d17aaa; }
    #themeBtn {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 9px; width: 30px; height: 30px; font-size: 13px;
      cursor: pointer; color: var(--text);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.25); }

    .hero-card {
      display: flex; align-items: center; gap: 12px;
      background: var(--card);
      border: 1.5px solid var(--card-border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .hero-card.glowing {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 1px rgba(139,92,246,0.3), 0 6px 24px rgba(139,92,246,0.25);
    }
    .hero-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--input-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; flex-shrink: 0;
      transition: background 0.3s;
    }
    .hero-card.glowing .hero-icon { background: var(--accent-gradient); }
    .hero-text { flex: 1; }
    .hero-title { font-size: 13.5px; font-weight: 700; }
    .hero-sub { font-size: 10.5px; color: var(--text-dim); margin-top: 1px; }

    .switch { position: relative; display: inline-block; width: 42px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background-color: #3a3a3a; transition: 0.2s; border-radius: 24px;
    }
    .slider:before {
      position: absolute; content: ""; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background-color: white; transition: 0.2s; border-radius: 50%;
    }
    input:checked + .slider { background: var(--accent-gradient); }
    input:checked + .slider:before { transform: translateX(18px); }
    .switch:active .slider:before { width: 22px; }

    .section-title {
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px;
      opacity: 0.55; margin: 2px 0 8px; font-weight: 700;
    }
    .row { display: flex; gap: 6px; }
    .profile-row-icon {
      display: flex; align-items: center; justify-content: center;
      width: 34px; flex-shrink: 0; font-size: 15px;
      background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 9px;
    }
    select, input[type="text"] {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 9px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
    }
    select:focus, input[type="text"]:focus { outline: none; border-color: var(--accent-2); }

    .stats-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .stat-card {
      flex: 1; background: var(--card); border: 1px solid var(--card-border);
      border-radius: 14px; padding: 12px 10px; text-align: center; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.blocked::before { background: #ff5566; }
    .stat-card.allowed::before { background: var(--green); }
    .stat-icon { font-size: 15px; margin-bottom: 2px; }
    .stat-card .num { font-size: 21px; font-weight: 800; transition: color 0.2s; }
    .stat-card.blocked .num { color: #ff5566; }
    .stat-card.allowed .num { color: var(--green); }
    .stat-card .label {
      font-size: 9.5px; opacity: 0.6; margin-top: 1px;
      text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600;
    }

    .chart-title {
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px;
      opacity: 0.55; margin-bottom: 8px; font-weight: 700;
    }
    .chart { display: flex; align-items: flex-end; gap: 6px; height: 70px; }
    .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .chart-bars { width: 100%; height: 54px; display: flex; align-items: flex-end; gap: 2px; justify-content: center; }
    .chart-bar { width: 7px; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .chart-bar.blocked { background: #ff5566; }
    .chart-bar.allowed { background: var(--green); }
    .chart-day { font-size: 9px; opacity: 0.5; }

    button {
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--input-border);
      border-radius: 9px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.08s, filter 0.15s;
      font-family: inherit;
    }
    button:hover { filter: brightness(1.15); }
    button:active:not(:disabled) { transform: scale(0.94); }
    button.primary { background: var(--accent-gradient); border: none; color: #fff; font-weight: 600; }
    button.primary:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.5; cursor: default; }

    #currentBtn { width: 100%; margin-bottom: 10px; text-align: left; font-weight: 600; }

    .tabs { display: flex; gap: 6px; margin-bottom: 10px; position: relative; background: var(--input-bg); padding: 4px; border-radius: 11px; }
    .tab {
      flex: 1; position: relative; z-index: 1; text-align: center; font-size: 11px; padding: 7px 4px;
      border-radius: 8px; cursor: pointer; color: var(--text-dim); font-weight: 600;
      transition: color 0.2s;
    }
    .tab.active { color: #fff; }
    .tab-indicator {
      position: absolute; top: 4px; bottom: 4px; left: 4px;
      width: calc((100% - 8px) / 3);
      background: var(--accent-gradient);
      border-radius: 8px;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
      box-shadow: 0 2px 8px rgba(255,0,68,0.3);
    }

    .list-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
    .list-tab {
      font-size: 10.5px; padding: 5px 10px; border-radius: 999px; cursor: pointer;
      background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-dim);
      transition: background 0.2s, color 0.2s, transform 0.1s, border-color 0.2s;
      font-weight: 600;
    }
    .list-tab.active { background: var(--accent-gradient); color: #fff; border-color: transparent; }
    .list-tab:active { transform: scale(0.95); }

    #searchInput { margin-bottom: 8px; }

    ul { list-style: none; margin: 0; padding: 0; max-height: 220px; overflow-y: auto; }
    li {
      display: flex; align-items: center; gap: 8px;
      background: var(--input-bg); border: 1px solid var(--card-border);
      border-radius: 10px; padding: 6px; margin-bottom: 6px;
      transition: background 0.2s, border-color 0.2s;
    }
    li img { width: 56px; height: 32px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: #222; }
    li .info { flex: 1; min-width: 0; }
    li .title { font-size: 11.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    li .id { font-size: 9.5px; opacity: 0.45; word-break: break-all; }
    li button.remove {
      background: transparent; border: none; color: #ff5566; font-size: 14px; padding: 2px 6px;
    }

    .empty {
      font-size: 12px; text-align: center; padding: 22px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .empty-icon { font-size: 26px; opacity: 0.7; }
    .empty-title { font-weight: 600; opacity: 0.75; }
    .empty-sub { font-size: 10.5px; opacity: 0.5; }

    @keyframes shimmer {
      0% { background-position: -120px 0; }
      100% { background-position: 120px 0; }
    }
    .thumb-shimmer {
      background: linear-gradient(90deg, #222 0%, #333 50%, #222 100%);
      background-size: 240px 100%;
      animation: shimmer 1.1s ease-in-out infinite;
    }

    @keyframes itemIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    li.item-enter { animation: itemIn 0.22s ease forwards; }
    li.item-leave {
      opacity: 0; transform: translateX(12px); max-height: 0;
      padding-top: 0; padding-bottom: 0; margin-bottom: 0; overflow: hidden;
      transition: opacity 0.18s ease, transform 0.18s ease, max-height 0.22s ease, padding 0.22s ease, margin 0.22s ease;
    }

    #toastContainer {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 6px; z-index: 999;
      pointer-events: none; width: calc(100% - 32px); align-items: center;
    }
    .toast {
      background: var(--card); color: var(--text);
      border: 1px solid var(--card-border); border-radius: 9px;
      padding: 8px 14px; font-size: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      max-width: 100%; font-weight: 500;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="bg-blob one"></div>
  <div class="bg-blob two"></div>

  <div class="header">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <div>
        <div class="brand-title">Study Shield</div>
        <div class="brand-sub"><span class="dot" id="statusDot"></span><span id="statusLabel">Study Mode: ON</span></div>
      </div>
    </div>
    <button id="themeBtn" title="Toggle theme">🌙</button>
  </div>

  <div class="hero-card" id="heroCard">
    <div class="hero-icon">🎯</div>
    <div class="hero-text">
      <div class="hero-title">Focus Mode</div>
      <div class="hero-sub" id="heroSub">Only allowed content can play</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enabledToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
      <div>
        <div class="hero-title" style="font-size:13px;">☕ Break reminders</div>
        <div class="hero-sub">Nudge me to rest during long sessions</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="breakToggle" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <select id="breakIntervalSelect">
        <option value="15">Every 15 min</option>
        <option value="30">Every 30 min</option>
        <option value="45">Every 45 min</option>
        <option value="60">Every 60 min</option>
        <option value="90">Every 90 min</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Study profile</div>
    <div class="row" style="margin-bottom:8px;">
      <div class="profile-row-icon">🎓</div>
      <select id="profileSelect"></select>
      <button id="newProfileBtn" title="New profile">➕</button>
      <button id="deleteProfileBtn" title="Delete this profile">🗑</button>
    </div>
    <div class="row" id="newProfileRow" style="display:none;">
      <input type="text" id="newProfileInput" placeholder="Profile name, e.g. DSA Revision" />
      <button class="primary" id="createProfileBtn">Create</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card blocked">
      <div class="stat-icon">🚫</div>
      <div class="num" id="blockedCount">0</div>
      <div class="label">Blocked today</div>
    </div>
    <div class="stat-card allowed">
      <div class="stat-icon">✅</div>
      <div class="num" id="allowedCount">0</div>
      <div class="label">Watched today</div>
    </div>
  </div>

  <div class="card">
    <div class="chart-title">Last 7 days</div>
    <div class="chart" id="weekChart"></div>
  </div>

  <div class="card">
    <div class="section-title">Add to allowed list</div>
    <div class="tabs" id="addTabs">
      <div class="tab-indicator" id="tabIndicator"></div>
      <div class="tab active" data-type="video">Video</div>
      <div class="tab" data-type="channel">Channel</div>
      <div class="tab" data-type="playlist">Playlist</div>
    </div>
    <button id="currentBtn">➕ Allow current tab's video</button>
    <div class="row">
      <input type="text" id="urlInput" placeholder="Paste YouTube video URL or ID" />
      <button class="primary" id="addBtn">Add</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Allowed list</div>
    <div class="list-tabs">
      <div class="list-tab active" data-list="videos">🎬 Videos</div>
      <div class="list-tab" data-list="channels">📺 Channels</div>
      <div class="list-tab" data-list="playlists">🎞️ Playlists</div>
    </div>
    <input type="text" id="searchInput" placeholder="Filter allowed list…" />
    <ul id="list"></ul>
  </div>

  <div id="toastContainer"></div>

  <script src="popup.js"></script>
</body>
</html>
