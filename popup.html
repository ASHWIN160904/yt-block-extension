<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --bg-2: #161616;
      --card: #1b1b1b;
      --card-border: #262626;
      --text: #f1f1f1;
      --text-dim: #a0a0a0;
      --accent: #ff0033;
      --accent-hover: #e6002e;
      --green: #4caf7d;
      --input-bg: #111;
      --input-border: #333;
    }
    body[data-theme="light"] {
      --bg: #f7f7f8;
      --bg-2: #ffffff;
      --card: #ffffff;
      --card-border: #e2e2e5;
      --text: #17171a;
      --text-dim: #6a6a70;
      --accent: #ff0033;
      --accent-hover: #e6002e;
      --green: #2f9e64;
      --input-bg: #f1f1f3;
      --input-border: #d8d8dc;
    }

    body {
      width: 360px;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      margin: 0;
      padding: 16px;
      transition: background 0.2s, color 0.2s;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #555; transition: background 0.2s;
    }
    .header .dot.on { background: var(--accent); box-shadow: 0 0 8px #ff003399; }
    .header h1 { font-size: 15px; margin: 0; font-weight: 700; letter-spacing: 0.2px; }
    #themeBtn {
      background: transparent; border: 1px solid var(--card-border);
      border-radius: 8px; width: 28px; height: 28px; font-size: 13px;
      cursor: pointer; color: var(--text);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .stats-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .stat-card {
      flex: 1; background: var(--card); border: 1px solid var(--card-border);
      border-radius: 10px; padding: 10px; text-align: center;
    }
    .stat-card .num { font-size: 20px; font-weight: 700; }
    .stat-card.blocked .num { color: #ff5566; }
    .stat-card.allowed .num { color: var(--green); }
    .stat-card .label {
      font-size: 10px; opacity: 0.6; margin-top: 2px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }

    .chart-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      opacity: 0.5; margin-bottom: 8px;
    }
    .chart {
      display: flex; align-items: flex-end; gap: 6px; height: 70px;
    }
    .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .chart-bars { width: 100%; height: 54px; display: flex; align-items: flex-end; gap: 2px; justify-content: center; }
    .chart-bar { width: 7px; border-radius: 3px 3px 0 0; min-height: 2px; }
    .chart-bar.blocked { background: #ff5566; }
    .chart-bar.allowed { background: var(--green); }
    .chart-day { font-size: 9px; opacity: 0.5; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-label { font-size: 13px; font-weight: 600; }
    .toggle-sub { font-size: 10px; opacity: 0.55; margin-top: 2px; }

    .switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background-color: #3a3a3a; transition: 0.2s; border-radius: 22px;
    }
    .slider:before {
      position: absolute; content: ""; height: 16px; width: 16px;
      left: 3px; bottom: 3px; background-color: white; transition: 0.2s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(18px); }

    button {
      background: #262626;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    body[data-theme="light"] button {
      background: #eee; color: #17171a; border: 1px solid #ddd;
    }
    button:hover { filter: brightness(1.15); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: default; }

    #currentBtn { width: 100%; margin-bottom: 10px; text-align: left; }

    .tabs { display: flex; gap: 6px; margin-bottom: 8px; }
    .tab {
      flex: 1; text-align: center; font-size: 11px; padding: 6px 4px;
      border-radius: 7px; cursor: pointer; background: transparent;
      border: 1px solid var(--card-border); color: var(--text-dim);
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .row { display: flex; gap: 6px; }
    input[type="text"] {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 9px;
      font-size: 12px;
    }
    input[type="text"]:focus { outline: none; border-color: var(--accent); }

    .section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      opacity: 0.5; margin: 4px 0 8px;
    }

    ul { list-style: none; margin: 0; padding: 0; max-height: 220px; overflow-y: auto; }
    li {
      display: flex; align-items: center; gap: 8px;
      background: var(--input-bg); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 6px; margin-bottom: 6px;
    }
    li img { width: 56px; height: 32px; object-fit: cover; border-radius: 5px; flex-shrink: 0; background: #222; }
    li .info { flex: 1; min-width: 0; }
    li .title { font-size: 11.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    li .id { font-size: 9.5px; opacity: 0.45; word-break: break-all; }
    li button.remove { background: transparent; border: none; color: #ff5566; font-size: 14px; padding: 2px 4px; }

    .empty { font-size: 12px; opacity: 0.5; text-align: center; padding: 14px 0; }

    .list-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
    .list-tab {
      font-size: 10.5px; padding: 4px 8px; border-radius: 6px; cursor: pointer;
      background: transparent; border: 1px solid var(--card-border); color: var(--text-dim);
    }
    .list-tab.active { background: var(--card-border); color: var(--text); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="dot" id="statusDot"></div>
      <h1 id="statusLabel">Study Mode</h1>
    </div>
    <button id="themeBtn" title="Toggle theme">🌙</button>
  </div>

  <div class="stats-row">
    <div class="stat-card blocked">
      <div class="num" id="blockedCount">0</div>
      <div class="label">Blocked today</div>
    </div>
    <div class="stat-card allowed">
      <div class="num" id="allowedCount">0</div>
      <div class="label">Watched today</div>
    </div>
  </div>

  <div class="card">
    <div class="chart-title">Last 7 days</div>
    <div class="chart" id="weekChart"></div>
  </div>

  <div class="card toggle-row">
    <div>
      <div class="toggle-label">Study Mode</div>
      <div class="toggle-sub">Only allowed content can play</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enabledToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <div class="section-title">Add to allowed list</div>
    <div class="tabs">
      <div class="tab active" data-type="video">Video</div>
      <div class="tab" data-type="channel">Channel</div>
      <div class="tab" data-type="playlist">Playlist</div>
    </div>
    <button id="currentBtn">➕ Allow current tab's video</button>
    <div class="row">
      <input type="text" id="urlInput" placeholder="Paste YouTube video URL or ID" />
      <button class="primary" id="addBtn">Add</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Allowed list</div>
    <div class="list-tabs">
      <div class="list-tab active" data-list="videos">Videos</div>
      <div class="list-tab" data-list="channels">Channels</div>
      <div class="list-tab" data-list="playlists">Playlists</div>
    </div>
    <ul id="list"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
