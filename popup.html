<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; }
    body {
      width: 340px;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0f0f0f 0%, #161616 100%);
      color: #f1f1f1;
      margin: 0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .header .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #555;
      transition: background 0.2s;
    }
    .header .dot.on { background: #ff0033; box-shadow: 0 0 8px #ff003399; }
    .header h1 {
      font-size: 15px;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .stats-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-card {
      flex: 1;
      background: #1b1b1b;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }
    .stat-card .num {
      font-size: 20px;
      font-weight: 700;
    }
    .stat-card.blocked .num { color: #ff5566; }
    .stat-card.allowed .num { color: #4caf7d; }
    .stat-card .label {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-label { font-size: 13px; font-weight: 600; }
    .toggle-sub { font-size: 10px; opacity: 0.55; margin-top: 2px; }

    .switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background-color: #3a3a3a; transition: 0.2s; border-radius: 22px;
    }
    .slider:before {
      position: absolute; content: ""; height: 16px; width: 16px;
      left: 3px; bottom: 3px; background-color: white; transition: 0.2s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #ff0033; }
    input:checked + .slider:before { transform: translateX(18px); }

    button {
      background: #262626;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #303030; }
    button.primary {
      background: #ff0033;
      border-color: #ff0033;
    }
    button.primary:hover { background: #e6002e; }

    #currentBtn { width: 100%; margin-bottom: 10px; text-align: left; }

    .row { display: flex; gap: 6px; }
    input[type="text"] {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      padding: 8px 9px;
      font-size: 12px;
    }
    input[type="text"]:focus { outline: none; border-color: #ff0033; }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.5;
      margin: 4px 0 8px;
    }

    ul { list-style: none; margin: 0; padding: 0; max-height: 260px; overflow-y: auto; }
    li {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #141414;
      border: 1px solid #232323;
      border-radius: 8px;
      padding: 6px;
      margin-bottom: 6px;
    }
    li img {
      width: 56px;
      height: 32px;
      object-fit: cover;
      border-radius: 5px;
      flex-shrink: 0;
      background: #222;
    }
    li .info { flex: 1; min-width: 0; }
    li .title {
      font-size: 11.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    li .id {
      font-size: 9.5px;
      opacity: 0.45;
    }
    li button.remove {
      background: transparent;
      border: none;
      color: #ff5566;
      font-size: 14px;
      padding: 2px 4px;
    }
    li button.remove:hover { background: #2a1414; }

    .empty {
      font-size: 12px;
      opacity: 0.5;
      text-align: center;
      padding: 14px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="statusDot"></div>
    <h1 id="statusLabel">Study Mode</h1>
  </div>

  <div class="stats-row">
    <div class="stat-card blocked">
      <div class="num" id="blockedCount">0</div>
      <div class="label">Blocked today</div>
    </div>
    <div class="stat-card allowed">
      <div class="num" id="allowedCount">0</div>
      <div class="label">Watched today</div>
    </div>
  </div>

  <div class="card toggle-row">
    <div>
      <div class="toggle-label">Study Mode</div>
      <div class="toggle-sub">Only allowed videos can play</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enabledToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <div class="section-title">Add a video</div>
    <button id="currentBtn">➕ Allow current tab's video</button>
    <div class="row">
      <input type="text" id="urlInput" placeholder="Paste YouTube URL or ID" />
      <button class="primary" id="addBtn">Add</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Allowed videos</div>
    <ul id="list"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
